<app-header></app-header>

<div class="mt-3 mb-0 p-3 bg-light rounded">
  <div class="row row-cols-1 row-cols-md-2 row-cols-lg-6">
    <!-- Region -->
    <div *ngIf="currentUserType == 'hq'" class="col mb-2">
      <p-multiSelect
      [(ngModel)]="selectedRegion"
      [options]="regions"
      optionLabel="label"
      optionValue="value"
      placeholder="Select Regions"
      (onChange)="onRegionChange()"
      [showToggleAll]="false"
     ></p-multiSelect>
    </div>
  

    <!-- MC -->
    <div *ngIf="currentUserType == 'hq'" class="col mb-2">
        <p-multiSelect
          [options]="centersMC"
          optionLabel="centre_name"
          placeholder="Select MCs"
          (onChange)="onMcChange()"
          [showToggleAll]="false"
        ></p-multiSelect>
      </div>

    <!-- RMC -->
    <div *ngIf="currentUserType == 'hq'" class="col mb-2">
      <p-multiSelect
          [options]="centersRMC" 
          optionLabel="centre_name"
          placeholder="Select RMCs"
          (onChange)="onRMcChange()"
          [showToggleAll]="false"
      ></p-multiSelect>
    </div>

    <!-- States -->
    <div class="col mb-2">
      <p-multiSelect 
             [(ngModel)]="selectedState"
             [options]="states"
             optionLabel="state_name"
             placeholder="Select States"
             (onChange)="onStateChange()"
             [showToggleAll]="false"
      ></p-multiSelect>
    </div>

    <!-- District -->
    <div class="col mb-2">
      <p-multiSelect 
           [options]="districts"          
           optionLabel="district_name"
           placeholder="Select Districts"
           [showToggleAll]="false"
           ></p-multiSelect>
    </div>

    <!-- Date -->
    <div class="col mb-2">
      <input type="date" class="form-control">
    </div>

    <!-- Submit Button -->
    <div class="col mb-2 mx-auto">
      <button class="btn btn-success w-50" type="button">Submit</button>
    </div>
  </div>
</div>
